<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ partial "seo.html" . }}
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <style>
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
            --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
            --accent: #ff6b35; --accent2: #f78166; --blue: #58a6ff;
            --green: #3fb950; --red: #f85149; --yellow: #d29922;
            --border: #30363d; --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
        }
        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        header {
            background: var(--bg2); border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .header-inner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 24px 0;
        }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .logo img { width: 36px; height: 36px; border-radius: 8px; }
        .logo span { color: var(--text); font-weight: 400; font-size: 14px; margin-left: 8px; }
        nav { display: flex; gap: 24px; }
        nav a { color: var(--text2); font-size: 16px; font-weight: 500; }
        nav a:hover { color: var(--text); text-decoration: none; }
        .streak { color: var(--accent); font-size: 13px; }

        /* Main */
        main.container { padding: 24px 0; margin-top: 32px; }
        .grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
        @media (max-width: 768px) { 
            .grid { grid-template-columns: 1fr; }
            .tools-grid { grid-template-columns: 1fr; }
            .header-inner { flex-direction: column; gap: 12px; }
            nav { flex-wrap: wrap; justify-content: center; }
            .logo { font-size: 20px; }
            .card { padding: 16px; }
            .container { padding: 0 12px; }
        }
        
        @media (min-width: 769px) and (max-width: 1024px) {
            .tools-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Cards */
        .card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px; font-weight: 700; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        /* Hot list */
        .hot-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .hot-item:last-child { border-bottom: none; }

        /* Tools Grid */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .tool-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            transition: all 0.2s ease;
        }
        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.1);
        }
        .tool-card .tool-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .tool-card .tool-icon {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .tool-card .tool-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--blue);
            word-break: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .tool-card .tool-desc {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .tool-card .tool-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tool-card .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tool-card .tool-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--bg);
            color: var(--text2);
        }
        .tool-card .tool-tag.hot {
            background: rgba(255,107,53,0.15);
            color: var(--accent);
        }
        .tool-card .tool-tag.free {
            background: rgba(63,185,80,0.15);
            color: var(--green);
        }
        .tool-card .tool-price {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
        }
        .hot-rank {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; flex-shrink: 0;
        }
        .hot-rank.top3 { background: var(--accent); color: #fff; }
        .hot-rank.normal { background: var(--bg3); color: var(--text2); }
        .hot-content { flex: 1; min-width: 0; }
        .hot-title { font-size: 14px; font-weight: 500; }
        .hot-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
        .hot-badge {
            font-size: 11px; padding: 2px 6px; border-radius: 4px;
            background: var(--bg3); color: var(--text2); margin-left: 6px;
        }
        .hot-badge.fire { background: rgba(255,107,53,0.2); color: var(--accent); }

        /* Spotlight */
        .spotlight {
            background: linear-gradient(135deg, var(--bg2), var(--bg3));
            border: 1px solid var(--accent); border-radius: var(--radius);
            padding: 24px; margin-bottom: 20px;
        }
        .spotlight-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .spotlight-desc { color: var(--text2); font-size: 14px; }
        .spotlight-btn {
            display: inline-block; margin-top: 12px;
            padding: 8px 20px; background: var(--accent); color: #fff;
            border-radius: 6px; font-size: 14px; font-weight: 600;
        }

        /* Trending */
        .trend-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .trend-item:last-child { border-bottom: none; }
        .trend-up { color: var(--green); font-weight: 600; }

        /* Tags */
        .tag {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 12px; background: var(--bg3); color: var(--text2);
            margin: 2px 4px 2px 0;
        }

        /* Footer */
        footer {
            text-align: center; padding: 40px 0; color: var(--text3);
            font-size: 13px; border-top: 1px solid var(--border);
        }

        /* Random button */
        .random-btn {
            display: block; width: 100%; padding: 12px;
            background: var(--bg3); border: 1px dashed var(--border);
            border-radius: var(--radius); color: var(--text2);
            font-size: 14px; cursor: pointer; text-align: center;
        }
        .random-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Search */
        .search-box {
            width: 100%; padding: 10px 14px; border-radius: var(--radius);
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 14px; outline: none;
        }
        .search-box:focus { border-color: var(--accent); }
        
        /* 分类导航 */
        .category-tag:hover {
            background: var(--accent) !important;
            color: #fff !important;
            border-color: var(--accent) !important;
        }
        .category-tag:active {
            transform: scale(0.95);
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 100px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <div>
                <div class="logo"><img src="/logos/logo.png" alt="AI热榜"> AI热榜 <span>每6小时更新</span></div>
            </div>
            <nav>
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}">{{ .Name }}</a>
                {{ end }}
            </nav>
            <div class="streak" id="streak"></div>
        </div>
    </header>

    <main class="container">
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <div class="container">
            <p>🔥 AI热榜 — 每6小时自动更新的中文AI导航站</p>
        </div>
    </footer>

    <script>
    // 连续访问天数
    (function(){
        const key = 'aihot_streak';
        const today = new Date().toISOString().slice(0,10);
        let data = JSON.parse(localStorage.getItem(key) || '{"streak":0,"last":""}');
        if(data.last === today) {
            // 同一天
        } else {
            const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
            if(data.last === yesterday) { data.streak++; }
            else { data.streak = 1; }
            data.last = today;
            localStorage.setItem(key, JSON.stringify(data));
        }
        if(data.streak > 0) {
            document.getElementById('streak').textContent = '🔥 连续访问 ' + data.streak + ' 天';
        }
    })();
    </script>
</body>
</html>
