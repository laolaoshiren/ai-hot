{{ define "main" }}
<div style="margin-bottom:20px">
    <a href="{{ relURL "/" }}" style="color:var(--text2);font-size:13px">← 返回热榜</a>
</div>

<!-- 搜索框 -->
<div style="margin-bottom:24px">
    <input type="text" class="search-box" placeholder="🔍 搜索 AI 工具、模型、Agent、新闻... (Ctrl+K)" id="searchInput" style="font-size:16px;padding:14px 18px">
</div>

<!-- 热门搜索 -->
<div id="hotSearch" style="margin-bottom:24px">
    <div style="font-size:13px;color:var(--text3);margin-bottom:8px">🔥 热门搜索</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px" id="hotTags"></div>
</div>

<!-- 搜索历史 -->
<div id="searchHistory" style="margin-bottom:24px;display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;color:var(--text3)">🕐 搜索历史</div>
        <button onclick="clearHistory()" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer">清空</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px" id="historyTags"></div>
</div>

<!-- 搜索结果 -->
<div id="searchResults"></div>

<script>
const searchData = {
    tools: {{ site.Data.tools | jsonify | safeJS }} || [],
    models: {{ site.Data.models | jsonify | safeJS }} || [],
    agents: {{ site.Data.agents | jsonify | safeJS }} || [],
    news: {{ site.Data.news | jsonify | safeJS }} || []
};

// 热门搜索词
const hotKeywords = ['Cursor', 'ChatGPT', 'DeepSeek', 'Claude', 'Midjourney', 'FLUX', 'Ollama', 'AI编程', 'AI绘画', 'AI视频', '开源模型', '免费AI'];
const hotTagsEl = document.getElementById('hotTags');
hotKeywords.forEach(kw => {
    const btn = document.createElement('button');
    btn.textContent = kw;
    btn.style.cssText = 'padding:6px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.2s';
    btn.onmouseenter = () => { btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)'; };
    btn.onmouseleave = () => { btn.style.borderColor='var(--border)';btn.style.color='var(--text2)'; };
    btn.onclick = () => { document.getElementById('searchInput').value = kw; doSearch(kw); };
    hotTagsEl.appendChild(btn);
});

// 搜索历史
function getHistory() { return JSON.parse(localStorage.getItem('aihot_search_history') || '[]'); }
function saveHistory(q) {
    let h = getHistory().filter(x => x !== q);
    h.unshift(q);
    h = h.slice(0, 10);
    localStorage.setItem('aihot_search_history', JSON.stringify(h));
    renderHistory();
}
function clearHistory() { localStorage.removeItem('aihot_search_history'); renderHistory(); }
function renderHistory() {
    const h = getHistory();
    const el = document.getElementById('searchHistory');
    const tags = document.getElementById('historyTags');
    if (h.length === 0) { el.style.display = 'none'; return; }
    el.style.display = '';
    tags.innerHTML = '';
    h.forEach(q => {
        const btn = document.createElement('button');
        btn.textContent = q;
        btn.style.cssText = 'padding:5px 12px;background:var(--bg3);border:none;border-radius:12px;font-size:12px;color:var(--text2);cursor:pointer';
        btn.onclick = () => { document.getElementById('searchInput').value = q; doSearch(q); };
        tags.appendChild(btn);
    });
}
renderHistory();

// 搜索逻辑
function searchAll(query) {
    if (!query || query.trim().length === 0) return { tools: [], models: [], agents: [], news: [] };
    const q = query.toLowerCase().trim();
    const results = { tools: [], models: [], agents: [], news: [] };

    searchData.tools.forEach(item => {
        const text = [item.name, item.description, item.category, item.pricing, ...(item.tags||[])].join(' ').toLowerCase();
        if (text.includes(q)) results.tools.push(item);
    });
    searchData.models.forEach(item => {
        const text = [item.name, item.display_name, item.author, item.pipeline_tag].join(' ').toLowerCase();
        if (text.includes(q)) results.models.push(item);
    });
    searchData.agents.forEach(item => {
        const text = [item.name, item.description, item.type, item.pricing].join(' ').toLowerCase();
        if (text.includes(q)) results.agents.push(item);
    });
    searchData.news.forEach(item => {
        const text = [item.title, item.summary, item.source].join(' ').toLowerCase();
        if (text.includes(q)) results.news.push(item);
    });
    return results;
}

function doSearch(query) {
    if (!query || query.trim().length === 0) {
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('hotSearch').style.display = '';
        document.getElementById('searchHistory').style.display = getHistory().length ? '' : 'none';
        return;
    }
    saveHistory(query.trim());
    document.getElementById('hotSearch').style.display = 'none';
    document.getElementById('searchHistory').style.display = 'none';

    const r = searchAll(query);
    const total = r.tools.length + r.models.length + r.agents.length + r.news.length;
    let html = '<div style="font-size:14px;color:var(--text2);margin-bottom:16px">找到 <strong style="color:var(--accent)">' + total + '</strong> 个结果</div>';

    if (r.tools.length > 0) {
        html += '<div class="card"><div class="card-title">🛠️ AI工具 <span class="hot-badge">' + r.tools.length + '</span></div><div class="tools-grid">';
        r.tools.slice(0, 12).forEach(t => {
            html += '<a href="' + t.url + '" target="_blank" class="tool-card" style="text-decoration:none;color:inherit">'
                + '<div class="tool-header"><div class="tool-icon">🛠️</div><div class="tool-name">' + t.name + '</div></div>'
                + '<div class="tool-desc">' + (t.description||'') + '</div>'
                + '<div class="tool-footer"><div class="tool-price">💰 ' + (t.pricing||'') + '</div></div></a>';
        });
        html += '</div></div>';
    }

    if (r.models.length > 0) {
        html += '<div class="card"><div class="card-title">🧠 AI模型 <span class="hot-badge">' + r.models.length + '</span></div><div class="tools-grid">';
        r.models.slice(0, 12).forEach(m => {
            html += '<a href="' + m.url + '" target="_blank" class="tool-card" style="text-decoration:none;color:inherit">'
                + '<div class="tool-header"><div class="tool-icon">🧠</div><div class="tool-name">' + (m.display_name||m.name) + '</div></div>'
                + '<div class="tool-desc">' + (m.author||'') + ' · ' + (m.pipeline_tag||'') + '</div>'
                + (m.likes ? '<div class="tool-footer"><span class="tool-tag free">❤️ ' + m.likes + '</span></div>' : '')
                + '</a>';
        });
        html += '</div></div>';
    }

    if (r.agents.length > 0) {
        html += '<div class="card"><div class="card-title">🤖 AI Agent <span class="hot-badge">' + r.agents.length + '</span></div><div class="tools-grid">';
        r.agents.forEach(a => {
            html += '<a href="https://' + a.url + '" target="_blank" class="tool-card" style="text-decoration:none;color:inherit">'
                + '<div class="tool-header"><div class="tool-icon">🤖</div><div class="tool-name">' + a.name + '</div></div>'
                + '<div class="tool-desc">' + (a.description||'') + '</div>'
                + '<div class="tool-footer"><div class="tool-price">💰 ' + (a.pricing||'') + '</div></div></a>';
        });
        html += '</div></div>';
    }

    if (r.news.length > 0) {
        html += '<div class="card"><div class="card-title">📰 AI新闻 <span class="hot-badge">' + r.news.length + '</span></div>';
        r.news.slice(0, 10).forEach(n => {
            html += '<div class="hot-item"><div class="hot-content"><div class="hot-title">'
                + '<a href="' + n.url + '" target="_blank">' + n.title + '</a>'
                + '<span class="hot-badge">' + n.source + '</span></div>'
                + (n.published ? '<div class="hot-meta">' + n.published.slice(0,16) + '</div>' : '')
                + (n.ai_summary ? '<div class="hot-meta" style="color:var(--accent)">🤖 ' + n.ai_summary + '</div>' : '')
                + '</div></div>';
        });
        html += '</div>';
    }

    if (total === 0) {
        html += '<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">🔍</div><div style="color:var(--text2)">没有找到「' + query + '」的相关结果</div><div style="color:var(--text3);font-size:13px;margin-top:8px">试试其他关键词？</div></div>';
    }

    document.getElementById('searchResults').innerHTML = html;
}

// 输入事件
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => doSearch(e.target.value), 300);
});

// 回车立即搜索
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { clearTimeout(searchTimeout); doSearch(e.target.value); }
});

// URL 参数 ?q=xxx
const params = new URLSearchParams(location.search);
const initQ = params.get('q');
if (initQ) { document.getElementById('searchInput').value = initQ; doSearch(initQ); }

// Ctrl+K 聚焦
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});
</script>
{{ end }}
